<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The saggy</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            width: 400px;
            height: 800px;
            background-color: lightpink;
            color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .divider {
            width: 80%;
            height: 3px; /* Increased height for a bolder look */
            background-color: black;
            margin: 20px 0;
            display: none; /* Initially hidden */
        }
        .divider.revealed {
            display: block; /* Show when revealed */
        }
        .blurred-text {
            filter: blur(5px);
            transition: filter 0.3s;
        }
        .blurred-text.revealed {
            filter: blur(0);
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .nav-buttons {
            display: none;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }
        .nav-buttons.revealed {
            display: flex;
        }
        .image-container {
            display: none;
            margin-top: 20px;
        }
        .image-container.revealed {
            display: block;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
      <p> Take care of yourself otherwise you will end up looking like chubby </p>
        
        <button id="revealButton" onclick="revealText()">What happened to him?</button>
        <div class="divider" id="divider"></div>
        <p class="blurred-text" id="moreText"> Too much mafia and dirty words made him liks this : <br>
        (especially dont want your booby becoming saggy due to stress ..i love them plumpy ,round and squishy 🥺</p>
        <div class="image-container" id="imageContainer">
            <img src="pic5.jpg" alt="Revealed Image">
        </div>
        <div class="nav-buttons" id="navButtons">
            <button onclick="navigate('previous')">Previous</button>
            <button onclick="navigate('next')">Next</button>
        </div>
    </div>

    <script>
        function revealText() {
            document.getElementById('moreText').classList.add('revealed');
            document.getElementById('navButtons').classList.add('revealed');
            document.getElementById('revealButton').style.display = 'none';
            document.getElementById('divider').classList.add('revealed');
            document.getElementById('imageContainer').classList.add('revealed');
        }

        function navigate(direction) {
            if (direction === 'next') {
                window.location.href = 'next6.html';
            } else if (direction === 'previous') {
                window.location.href = 'next5.html';
            }
        }
    </script>
</body>
</html>
